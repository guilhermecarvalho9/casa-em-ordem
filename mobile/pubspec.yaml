name: homio
description: "Homio - App Mobile"
publish_to: 'none'
version: 1.0.1+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.5
  intl: ^0.19.0
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8
  google_mobile_ads: ^5.1.0
  firebase_storage: ^12.3.4
  mobile_scanner: ^7.0.0
  file_picker: ^8.1.4
  xml: ^6.5.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0
  in_app_purchase: ^3.2.0
  app_tracking_transparency: ^2.0.7
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.jpeg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpeg
    - assets/logo-homio-fundo-transparente.png
